# Threat Catalog - API-specific threats (OWASP API Top 10)
threats:
  T001:
    name: Broken Object Level Authorization
    description: API exposes endpoints without proper authorization checks
    severity: critical
    stride: E
    cwe: CWE-639
    suggested_mitigations: [M001, M002]

  T002:
    name: Broken Authentication
    description: Weak API key management or token validation
    severity: critical
    stride: S
    cwe: CWE-287
    suggested_mitigations: [M003, M004]

  T003:
    name: Excessive Data Exposure
    description: API returns more data than necessary
    severity: medium
    stride: I
    cwe: CWE-200
    suggested_mitigations: [M005]

  T004:
    name: Lack of Rate Limiting
    description: API doesn't limit request frequency
    severity: medium
    stride: D
    cwe: CWE-770
    suggested_mitigations: [M006]

  T005:
    name: Injection
    description: Unsanitized input in queries or commands
    severity: high
    stride: T
    cwe: CWE-89
    suggested_mitigations: [M007, M008]

  T006:
    name: Mass Assignment
    description: API binds client input to internal objects without filtering
    severity: medium
    stride: T
    cwe: CWE-915
    suggested_mitigations: [M009]

