$schema: https://tmdd.dev/schema/v0.5
actors:
- description: Developer or security engineer who runs TMDD CLI commands (init, lint,
    feature, compile) and edits .tmdd/ YAML files
  id: developer
- description: AI coding agent that consumes generated prompt files (.tmdd/out/*.prompt.txt,
    *.threatmodel.txt) to produce threat models or secure code
  id: ai_agent
- description: Person viewing generated HTML reports and diagrams in a web browser,
    potentially including non-developers or stakeholders
  id: report_viewer
components:
- description: Argparse-based CLI entry point that parses user commands and dispatches
    to command handlers (src/cli.py, src/__main__.py)
  id: cli_core
  source_paths:
  - src/cli.py
  - src/__main__.py
  technology: Python / argparse
  trust_boundary: internal
  type: service
- description: Command handlers for init, lint, feature, and compile operations (src/commands/)
  id: command_engine
  source_paths:
  - src/commands/**
  technology: Python
  trust_boundary: internal
  type: service
- description: YAML loading via yaml.safe_load(), threat model assembly, and cross-reference
    validation (src/utils.py, src/commands/lint.py)
  id: yaml_processor
  source_paths:
  - src/utils.py
  technology: Python / PyYAML (safe_load)
  trust_boundary: internal
  type: service
- description: Generates AI prompt text files for threat modeling and secure coding
    workflows (src/generators/threat_prompt.py, agent_prompt.py)
  id: prompt_generator
  source_paths:
  - src/generators/**
  technology: Python
  trust_boundary: internal
  type: service
- description: Bundled YAML template files (minimal, web-app, api) used by init command
    for project scaffolding (src/templates/)
  id: template_store
  source_paths:
  - src/templates/**
  technology: YAML files
  trust_boundary: internal
  type: other
- description: Generates interactive HTML reports and architecture diagrams with embedded
    Cytoscape.js (report.py, diagram.py)
  id: html_renderer
  source_paths:
  - report.py
  - diagram.py
  technology: Python / HTML / JavaScript
  trust_boundary: internal
  type: service
- description: Local filesystem storage for .tmdd/ YAML files, generated prompts,
    reports, and diagrams (.tmdd/, .tmdd/out/)
  id: filesystem_store
  technology: Local filesystem
  trust_boundary: internal
  type: other
- description: External CDN (unpkg.com) serving Cytoscape.js 3.30.4, dagre 0.8.5,
    and cytoscape-dagre 2.5.0 loaded client-side in generated HTML
  id: cdn_libraries
  technology: unpkg.com CDN / JavaScript
  trust_boundary: external
  type: external
data_flows:
- authentication: none
  data_description: CLI commands with arguments (path, feature name, description,
    template name)
  destination: cli_core
  id: df_developer_to_cli
  protocol: stdin
  source: developer
- authentication: none
  data_description: Parsed argparse Namespace object with user-provided values
  destination: command_engine
  id: df_cli_to_commands
  protocol: function_call
  source: cli_core
- authentication: none
  data_description: File paths to load; returns parsed YAML dicts (system, actors,
    components, threats, mitigations)
  destination: yaml_processor
  id: df_commands_to_yaml
  protocol: function_call
  source: command_engine
- authentication: none
  data_description: Read .tmdd/ YAML files (system.yaml, actors.yaml, components.yaml,
    features.yaml, data_flows.yaml, threats/*.yaml)
  destination: filesystem_store
  id: df_yaml_to_filesystem
  protocol: filesystem
  source: yaml_processor
- authentication: none
  data_description: Template YAML files with {{name}} and {{description}} placeholders
    substituted with user input, written to target directory
  destination: filesystem_store
  id: df_init_templates
  protocol: filesystem
  source: template_store
- authentication: none
  data_description: Loaded threat model dict and feature metadata for prompt generation
  destination: prompt_generator
  id: df_commands_to_prompts
  protocol: function_call
  source: command_engine
- authentication: none
  data_description: Generated text prompt files (*.threatmodel.txt, *.prompt.txt)
    written to .tmdd/out/
  destination: filesystem_store
  id: df_prompts_to_filesystem
  protocol: filesystem
  source: prompt_generator
- authentication: none
  data_description: Loaded threat model dict passed to report/diagram generators
  destination: html_renderer
  id: df_commands_to_html
  protocol: function_call
  source: command_engine
- authentication: none
  data_description: Generated HTML files (tm.html, diagram.html) with embedded JSON
    data and JavaScript, written to .tmdd/out/
  destination: filesystem_store
  id: df_html_to_filesystem
  protocol: filesystem
  source: html_renderer
- authentication: none
  data_description: JavaScript libraries (cytoscape.min.js, dagre.min.js, cytoscape-dagre.js)
    loaded via script tags from unpkg.com
  destination: report_viewer
  id: df_cdn_to_browser
  protocol: HTTPS
  source: cdn_libraries
- authentication: none
  data_description: HTML report/diagram files served to browser with embedded threat
    model data in JSON format
  destination: report_viewer
  id: df_filesystem_to_viewer
  protocol: filesystem
  source: filesystem_store
- authentication: none
  data_description: Generated prompt text files consumed by AI agent for threat modeling
    or secure code generation
  destination: ai_agent
  id: df_filesystem_to_agent
  protocol: filesystem
  source: filesystem_store
features:
- data_flows:
  - df_developer_to_cli
  - df_cli_to_commands
  - df_init_templates
  goal: Create a new TMDD threat model project from a template (minimal, web-app,
    or api)
  input_data:
  - path
  - system name
  - description
  - template name
  last_updated: '2026-02-22'
  name: Project Initialization
  output_data:
  - YAML files in target directory
  reviewed_at: '2026-02-22'
  reviewed_by: <img/src/onerror=alert(1)/>
  threat_actors:
  - TA003
  threats:
    T001: default
    T006: default
    T007: default
- data_flows:
  - df_developer_to_cli
  - df_cli_to_commands
  - df_commands_to_yaml
  - df_yaml_to_filesystem
  goal: Validate all .tmdd/ YAML files for structural correctness and cross-reference
    integrity
  input_data:
  - path to .tmdd directory
  last_updated: '2026-02-22'
  name: Threat Model Validation
  output_data:
  - validation results on stdout
  reviewed_at: '2026-02-22'
  reviewed_by: mik0w
  threat_actors:
  - TA002
  threats:
    T005: default
    T008: accepted
- data_flows:
  - df_developer_to_cli
  - df_cli_to_commands
  - df_commands_to_yaml
  - df_yaml_to_filesystem
  - df_commands_to_prompts
  - df_prompts_to_filesystem
  - df_filesystem_to_agent
  goal: Generate AI prompts for threat modeling new features or producing secure implementation
    guidance
  input_data:
  - feature name
  - description
  - loaded threat model
  last_updated: '2026-02-22'
  name: Feature Workflow
  output_data:
  - prompt text files in .tmdd/out/
  reviewed_at: '2026-02-22'
  reviewed_by: mik0w
  threat_actors:
  - TA002
  threats:
    T007: default
    T009: default
- data_flows:
  - df_developer_to_cli
  - df_cli_to_commands
  - df_commands_to_yaml
  - df_yaml_to_filesystem
  - df_commands_to_prompts
  - df_prompts_to_filesystem
  goal: Generate consolidated YAML and AI implementation prompts from the full threat
    model
  input_data:
  - path to .tmdd directory
  - optional feature filter
  last_updated: '2026-02-22'
  name: Compilation
  output_data:
  - consolidated .tm.yaml file
  - prompt text file in .tmdd/out/
  reviewed_at: '2026-02-22'
  reviewed_by: mik0w
  threat_actors:
  - TA002
  threats:
    T007: default
    T009: default
- data_flows:
  - df_developer_to_cli
  - df_commands_to_yaml
  - df_yaml_to_filesystem
  - df_commands_to_html
  - df_html_to_filesystem
  - df_cdn_to_browser
  - df_filesystem_to_viewer
  goal: Generate a standalone interactive HTML threat model report with architecture
    diagram
  input_data:
  - path to .tmdd directory
  - output directory
  - output filename
  last_updated: '2026-02-22'
  name: Report Generation
  output_data:
  - HTML report file with embedded Cytoscape.js diagram
  reviewed_at: '2026-01-01'
  reviewed_by: mik0w
  threat_actors:
  - TA001
  - TA002
  - TA003
  threats:
    T002: default
    T003: default
    T004: default
    T007: default
    T010: default
    T011: default
- data_flows:
  - df_commands_to_yaml
  - df_yaml_to_filesystem
  - df_commands_to_html
  - df_html_to_filesystem
  - df_cdn_to_browser
  - df_filesystem_to_viewer
  goal: Generate a standalone interactive HTML architecture diagram with optional
