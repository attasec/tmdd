# Mitigations Catalog - Security controls for web applications
#
# Each mitigation can be a simple string or a rich object:
#   parameterized_queries: "Description"
#   input_validation:
#     description: "Description"
#     references:                        # optional code references
#       - file: "src/auth/middleware.ts"
#         lines: "42-58"                 # optional line or range
#
mitigations:
  parameterized_queries: Parameterized queries / prepared statements
  input_validation: Input validation and sanitization
  output_encoding: Output encoding (HTML, JavaScript, URL context)
  csp_headers: Content Security Policy (CSP) headers
  secure_sessions: Secure session management (HttpOnly, Secure flags)
  mfa: Multi-factor authentication (MFA)
  tls: TLS 1.3 for all connections
  encryption_at_rest: Encryption at rest (AES-256)
  rbac: Role-based access control (RBAC)
  server_side_authz: Server-side authorization checks
  csrf_tokens: CSRF tokens on state-changing requests
  rate_limiting: Rate limiting with exponential backoff
