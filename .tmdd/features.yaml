# =============================================================================
# Features - TMDD CLI capabilities with threat-to-mitigation mappings
# =============================================================================

features:
  - name: "Project Initialization"
    goal: "Create a new TMDD threat model project from a template (minimal, web-app, or api)"
    input_data: [path, system name, description, template name]
    output_data: [YAML files in target directory]
    data_flows: [df_developer_to_cli, df_cli_to_commands, df_init_templates]
    threat_actors: [ci_pipeline_untrusted]
    threats:
      yaml_template_injection: default
      init_path_traversal: default
      output_info_disclosure: default
    last_updated: "2026-02-22"
    reviewed_by: "mik0w"
    reviewed_at: "2026-02-22"

  - name: "Threat Model Validation"
    goal: "Validate all .tmdd/ YAML files for structural correctness and cross-reference integrity"
    input_data: [path to .tmdd directory]
    output_data: [validation results on stdout]
    data_flows: [df_developer_to_cli, df_cli_to_commands, df_commands_to_yaml, df_yaml_to_filesystem]
    threat_actors: [malicious_insider_fs]
    threats:
      yaml_dos_oversized: default
      no_audit_trail: accepted
    last_updated: "2026-02-22"
    reviewed_by: "mik0w"
    reviewed_at: "2026-02-22"

  - name: "Feature Workflow"
    goal: "Generate AI prompts for threat modeling new features or producing secure implementation guidance"
    input_data: [feature name, description, loaded threat model]
    output_data: [prompt text files in .tmdd/out/]
    data_flows: [df_developer_to_cli, df_cli_to_commands, df_commands_to_yaml, df_yaml_to_filesystem, df_commands_to_prompts, df_prompts_to_filesystem, df_filesystem_to_agent]
    threat_actors: [malicious_insider_fs]
    threats:
      prompt_injection: default
      output_info_disclosure: default
    last_updated: "2026-02-22"
    reviewed_by: "mik0w"
    reviewed_at: "2026-02-22"

  - name: "Compilation"
    goal: "Generate consolidated YAML and AI implementation prompts from the full threat model"
    input_data: [path to .tmdd directory, optional feature filter]
    output_data: [consolidated .tm.yaml file, prompt text file in .tmdd/out/]
    data_flows: [df_developer_to_cli, df_cli_to_commands, df_commands_to_yaml, df_yaml_to_filesystem, df_commands_to_prompts, df_prompts_to_filesystem]
    threat_actors: [malicious_insider_fs]
    threats:
      output_info_disclosure: default
      prompt_injection: default
    last_updated: "2026-02-22"
    reviewed_by: "mik0w"
    reviewed_at: "2026-02-22"

  - name: "Report Generation"
    goal: "Generate a standalone interactive HTML threat model report with architecture diagram"
    input_data: [path to .tmdd directory, output directory, output filename]
    output_data: [HTML report file with embedded Cytoscape.js diagram]
    data_flows: [df_developer_to_cli, df_commands_to_yaml, df_yaml_to_filesystem, df_commands_to_html, df_html_to_filesystem, df_cdn_to_browser, df_filesystem_to_viewer]
    threat_actors: [cdn_package_attacker, malicious_insider_fs, ci_pipeline_untrusted]
    threats:
      cdn_supply_chain_attack: default
      xss_stored_diagram: default
      xss_stored_node_info: default
      output_info_disclosure: default
      json_script_breakout: default
      report_path_traversal: default
    last_updated: "2026-02-22"
    reviewed_by: "mik0w"
    reviewed_at: "2026-01-01"

  - name: "Diagram Generation"
    goal: "Generate a standalone interactive HTML architecture diagram with optional feature highlighting"
    input_data: [path to .tmdd directory, optional feature name]
    output_data: [HTML diagram file with embedded Cytoscape.js visualization]
    data_flows: [df_commands_to_yaml, df_yaml_to_filesystem, df_commands_to_html, df_html_to_filesystem, df_cdn_to_browser, df_filesystem_to_viewer]
    threat_actors: [cdn_package_attacker, malicious_insider_fs]
    threats:
      cdn_supply_chain_attack: default
      xss_stored_diagram: default
      xss_stored_node_info: default
      json_script_breakout: default
    last_updated: "2026-02-22"
    reviewed_by: "mik0w"
    reviewed_at: "2026-02-22"
