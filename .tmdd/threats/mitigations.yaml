# =============================================================================
# Mitigations Catalog - Security controls for the TMDD CLI
# =============================================================================

mitigations:
  yaml_escape_init_input:
    description: "Escape or quote user-provided name/description values before substituting into YAML templates during init, using yaml.dump() or proper YAML string quoting to prevent structural injection"
    references:
      - file: "src/commands/init.py"
        lines: "36-39"

  sri_hashes_cdn:
    description: "Pin CDN library versions with Subresource Integrity (SRI) hashes on all <script> tags in generated HTML to prevent tampered JavaScript from executing"
    references:
      - file: "report.py"
        lines: "943-945"
      - file: "diagram.py"
        lines: "143-145"

  bundle_libs_locally:
    description: "Bundle Cytoscape.js and dagre libraries locally instead of relying on CDN, eliminating the external dependency and enabling fully offline report viewing"
    references:
      - file: "report.py"
        lines: "943-945"

  replace_innerhtml_textcontent:
    description: "Replace innerHTML assignments in _DIAGRAM_JS with textContent for plain text values, or use DOM createElement/createTextNode for safe HTML construction"
    references:
      - file: "report.py"
        lines: "572-872"

  js_html_escape_helper:
    description: "Implement a JavaScript HTML-escape helper function in _DIAGRAM_JS and apply it to all threat model values (names, descriptions, labels) before inserting into HTML strings"
    references:
      - file: "report.py"
        lines: "572-872"



  git_change_tracking: "Rely on Git version control for change tracking and attribution of .tmdd/ YAML files; document this requirement in README and generated AGENTS.md"

  prompt_delimiters:
    description: "Add clear delimiter markers and role boundaries in generated AI prompts to reduce the effectiveness of prompt injection from threat model content"
    references:
      - file: "src/generators/agent_prompt.py"
        lines: "17-19"
      - file: "src/generators/threat_prompt.py"

  enhanced_safe_json:
    description: "Enhance _safe_json() to escape additional dangerous characters beyond </ including HTML entities and ensure Content-Type is set correctly for embedded JSON data"
    references:
      - file: "report.py"
        lines: "113-114"

  validate_report_filename:
    description: "Validate the --name output filename in report.py by stripping path separators and applying safe_name() or os.path.basename() before joining with the output directory, consistent with diagram.py's safe_name() approach"
    references:
      - file: "report.py"
        lines: "1085-1088"
