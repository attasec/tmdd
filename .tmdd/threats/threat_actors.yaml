# =============================================================================
# Threat Actors - Who might attack the TMDD system
# =============================================================================

threat_actors:
  - id: cdn_package_attacker
    description: "External attacker who compromises a CDN or npm package used by TMDD-generated HTML reports"

  - id: malicious_insider_fs
    description: "Malicious insider with filesystem access who tampers with .tmdd/ YAML files to inject harmful content into reports or AI prompts"

  - id: ci_pipeline_untrusted
    description: "Automated CI/CD pipeline that invokes TMDD commands with untrusted or user-controlled input parameters"
